name: Build

permissions:
  contents: read
  checks: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_FILE: SemanticDiff.slnx
  APP_PROJECT: src/SemanticDiff.App/SemanticDiff.App.csproj
  TEST_PROJECT: tests/SemanticDiff.Tests/SemanticDiff.Tests.csproj
  DESKTOP_TARGET_FRAMEWORK: net10.0-desktop

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-prefix: ${{ steps.version.outputs.version-prefix }}
      version-suffix: ${{ steps.version.outputs.version-suffix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION_PREFIX=$(sed -nE 's/.*<VersionPrefix[^>]*>([^<]+)<\/VersionPrefix>.*/\1/p' Directory.Build.props | head -n 1)

          if [[ -z "${VERSION_PREFIX}" ]]; then
            echo "VersionPrefix was not found in Directory.Build.props" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            VERSION_SUFFIX=""
            VERSION="${VERSION_PREFIX}"
          else
            VERSION_SUFFIX="ci.${GITHUB_RUN_NUMBER}"
            VERSION="${VERSION_PREFIX}-${VERSION_SUFFIX}"
          fi

          {
            echo "version-prefix=${VERSION_PREFIX}"
            echo "version-suffix=${VERSION_SUFFIX}"
            echo "version=${VERSION}"
          } >> "${GITHUB_OUTPUT}"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build
        run: dotnet build "${{ env.TEST_PROJECT }}" -c Release -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Test
        run: dotnet test "${{ env.TEST_PROJECT }}" -c Release --no-build --logger trx --results-directory artifacts/test/unit -p:Version="${{ needs.version.outputs.version }}"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: artifacts/test/unit/**/*.trx
          if-no-files-found: error
          retention-days: 7

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Unit Tests
          path: artifacts/test/unit/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  desktop-build:
    name: Desktop Build (macOS)
    runs-on: macos-14
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build app
        run: dotnet build "${{ env.APP_PROJECT }}" -c Release -f "${{ env.DESKTOP_TARGET_FRAMEWORK }}" -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Build controls sample
        run: dotnet build samples/SemanticDiff.Controls.Uno.Sample/SemanticDiff.Controls.Uno.Sample.csproj -c Release -f "${{ env.DESKTOP_TARGET_FRAMEWORK }}" -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

  app-publish:
    name: App Publish (${{ matrix.target.id }})
    runs-on: ${{ matrix.target.runner }}
    needs:
      - version
      - build-and-test
      - desktop-build
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-x64
            runner: ubuntu-latest
            rid: linux-x64
            format: folder
          - id: win-x64
            runner: windows-latest
            rid: win-x64
            format: folder
          - id: macos-arm64
            runner: macos-14
            rid: osx-arm64
            format: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish app
        shell: bash
        run: |
          scripts/publish-app.sh \
            --rid "${{ matrix.target.rid }}" \
            --format "${{ matrix.target.format }}" \
            --version "${{ needs.version.outputs.version }}" \
            --archive-name "SemanticDiff.App-${{ needs.version.outputs.version }}-${{ matrix.target.id }}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.target.id }}
          path: artifacts/publish/app/SemanticDiff.App-${{ needs.version.outputs.version }}-${{ matrix.target.id }}.zip
          if-no-files-found: error
          retention-days: 14

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs:
      - version
      - build-and-test
      - desktop-build
      - app-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Pack
        run: dotnet pack "${{ env.SOLUTION_FILE }}" -c Release --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}" -o artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 30
