name: Release

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0 or 0.1.0-preview.1"
        required: true
        type: string
      prerelease:
        description: "Mark the release as prerelease"
        required: false
        type: boolean
        default: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_FILE: SemanticDiff.slnx
  APP_PROJECT: src/SemanticDiff.App/SemanticDiff.App.csproj
  TEST_PROJECT: tests/SemanticDiff.Tests/SemanticDiff.Tests.csproj
  DESKTOP_TARGET_FRAMEWORK: net10.0-desktop

jobs:
  version:
    name: Determine Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
      tag-name: ${{ steps.version.outputs.tag-name }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
            TAG_NAME="v${VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [[ "${VERSION}" == *"-"* ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          fi

          {
            echo "version=${VERSION}"
            echo "is-prerelease=${IS_PRERELEASE}"
            echo "tag-name=${TAG_NAME}"
          } >> "${GITHUB_OUTPUT}"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build
        run: dotnet build "${{ env.TEST_PROJECT }}" -c Release -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Test
        run: dotnet test "${{ env.TEST_PROJECT }}" -c Release --no-build --logger trx --results-directory artifacts/test/unit -p:Version="${{ needs.version.outputs.version }}"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-unit-test-results
          path: artifacts/test/unit/**/*.trx
          if-no-files-found: error
          retention-days: 30

  desktop-build:
    name: Desktop Build (macOS)
    runs-on: macos-14
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build app
        run: dotnet build "${{ env.APP_PROJECT }}" -c Release -f "${{ env.DESKTOP_TARGET_FRAMEWORK }}" -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Build controls sample
        run: dotnet build samples/SemanticDiff.Controls.Uno.Sample/SemanticDiff.Controls.Uno.Sample.csproj -c Release -f "${{ env.DESKTOP_TARGET_FRAMEWORK }}" -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

  app-publish:
    name: App Publish (${{ matrix.target.id }})
    runs-on: ${{ matrix.target.runner }}
    needs:
      - version
      - build-and-test
      - desktop-build
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-x64
            runner: ubuntu-latest
            rid: linux-x64
            format: folder
          - id: win-x64
            runner: windows-latest
            rid: win-x64
            format: folder
          - id: macos-arm64
            runner: macos-14
            rid: osx-arm64
            format: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish app
        shell: bash
        run: |
          scripts/publish-app.sh \
            --rid "${{ matrix.target.rid }}" \
            --format "${{ matrix.target.format }}" \
            --version "${{ needs.version.outputs.version }}" \
            --archive-name "SemanticDiff.App-${{ needs.version.outputs.version }}-${{ matrix.target.id }}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-app-${{ matrix.target.id }}
          path: artifacts/publish/app/SemanticDiff.App-${{ needs.version.outputs.version }}-${{ matrix.target.id }}.zip
          if-no-files-found: error
          retention-days: 90

  pack:
    name: Pack Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-and-test
      - desktop-build
      - app-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Pack
        run: dotnet pack "${{ env.SOLUTION_FILE }}" -c Release --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}" -o artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 90

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs:
      - version
      - pack
    environment: nuget
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish packages
        shell: bash
        run: |
          shopt -s nullglob
          for package in packages/*.nupkg; do
            dotnet nuget push "${package}" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          for package in packages/*.snupkg; do
            dotnet nuget push "${package}" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - pack
      - publish-nuget
      - app-publish
    permissions:
      contents: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Download app packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-app-*
          path: app-packages
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: SemanticDiff v${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag-name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ needs.version.outputs.is-prerelease == 'true' }}
          generate_release_notes: true
          files: |
            packages/*.nupkg
            packages/*.snupkg
            app-packages/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
